<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块</title>
    <!-- 使用 React 开发环境 -->
    <script crossorigin src="./assets/js/react.development.js"></script>
    <script crossorigin src="./assets/js/react-dom.development.js"></script>
    <script src="./assets/js/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2b3a4a 0%, #1d2b36 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            transition: background 0.3s ease;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0b1a2a 0%, #0e1a1f 100%);
            }
        }

        #root {
            width: 100%;
            max-width: 700px;
        }

        :root {
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --info-bg: #ecf0f1;
            --border-color: #b0bec5;
            --panel-bg: #f8f9fa;
            --grid-border: #34495e;
            --grid-bg: #ecf0f1;
            --block-glow: rgba(255, 255, 255, 0.5);
            --btn-primary: #3498db;
            --btn-warning: #f39c12;
            --btn-danger: #e74c3c;
            --btn-success: #2ecc71;
            --btn-secondary: #95a5a6;
            --toast-bg: rgba(0, 0, 0, 0.8);
            --toast-text: white;
            --message-bg: white;
            --shadow-color: rgba(0, 0, 0, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1e2b38;
                --text-color: #e0e0e0;
                --info-bg: #2c3e50;
                --border-color: #4a5b6b;
                --panel-bg: #263238;
                --grid-border: #78909c;
                --grid-bg: #2a3b47;
                --btn-primary: #2980b9;
                --btn-warning: #e67e22;
                --btn-danger: #c0392b;
                --btn-success: #27ae60;
                --btn-secondary: #7f8c8d;
                --toast-bg: rgba(255, 255, 255, 0.9);
                --toast-text: #2c3e50;
                --message-bg: #34495e;
                --shadow-color: rgba(0, 0, 0, 0.5);
            }
        }

        .tetris-container {
            background: var(--bg-color);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px var(--shadow-color);
            transition: background 0.3s, color 0.3s;
            color: var(--text-color);
        }

        h1 {
            text-align: center;
            margin: 0 0 12px 0;
            font-weight: 400;
            font-size: 2em;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px var(--shadow-color);
        }

        .game-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        /* 主游戏区 - Canvas 容器 */
        .play-area {
            flex: 2;
            min-width: 280px;
            display: flex;
            justify-content: center;
        }

        .canvas-wrapper {
            border: 3px solid var(--grid-border);
            border-radius: 8px;
            background: var(--grid-border);
            box-shadow: 0 10px 20px var(--shadow-color);
            width: 100%;
            max-width: 300px;
            /* 保持比例 */
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: var(--grid-bg);
            border-radius: 4px;
            cursor: pointer;
            image-rendering: crisp-edges;
            /* 保持清晰 */
        }

        /* 右侧信息 */
        .info-area {
            flex: 1;
            min-width: 180px;
            background: var(--info-bg);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: inset 0 2px 6px var(--shadow-color);
        }

        .stat-item {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
        }

        .next-piece {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }

        .next-title {
            margin-bottom: 12px;
            font-weight: 600;
        }

        .next-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            background: var(--grid-border);
            border: 2px solid var(--grid-border);
            width: 120px;
            margin: 0 auto;
            aspect-ratio: 1/1;
        }

        .next-cell {
            background: var(--grid-bg);
        }

        .next-cell.filled {
            background: currentColor;
            box-shadow:
                inset -2px -2px 4px rgba(0, 0, 0, 0.3),
                inset 2px 2px 4px rgba(255, 255, 255, 0.5);
            border-radius: 2px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow:
                0 6px 0 rgba(0, 0, 0, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transition: all 0.08s linear;
            color: white;
            flex: 1 0 80px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow:
                0 2px 0 rgba(0, 0, 0, 0.2),
                inset 0 1px 2px rgba(255, 255, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--btn-primary);
        }

        .btn-warning {
            background: var(--btn-warning);
        }

        .btn-danger {
            background: var(--btn-danger);
        }

        .btn-success {
            background: var(--btn-success);
        }

        .btn-secondary {
            background: var(--btn-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--message-bg);
            color: var(--text-color);
            padding: 30px 24px;
            border-radius: 40px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px var(--shadow-color);
            animation: slideUp 0.3s;
            border: 2px solid var(--border-color);
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .best-record {
            background: var(--info-bg);
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 8px 20px black;
            animation: fadeInOut 2s forwards;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translate(-50%, 20%);
            }

            15% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }

            85% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -80%);
            }
        }

        .instructions {
            margin-top: 20px;
            font-size: 13px;
            background: var(--info-bg);
            padding: 12px;
            border-radius: 20px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ---------- 俄罗斯方块核心常量 ----------
        const COLS = 10;
        const ROWS = 20;
        const SHAPES = [
            [[1, 1, 1, 1]], // I
            [[1, 1], [1, 1]], // O
            [[0, 1, 0], [1, 1, 1]], // T
            [[0, 1, 1], [1, 1, 0]], // S
            [[1, 1, 0], [0, 1, 1]], // Z
            [[1, 0, 0], [1, 1, 1]], // L
            [[0, 0, 1], [1, 1, 1]]  // J
        ];

        const COLOR_PALETTE = [
            '#00e5f0', '#2dd4bf', '#14b8a6', '#0d9488', '#0891b2',
            '#f0e43b', '#fbbf24', '#f59e0b', '#d97706', '#b45309',
            '#c158f0', '#a855f7', '#9333ea', '#7e22ce', '#6b21a8',
            '#5cd65c', '#4ade80', '#22c55e', '#16a34a', '#15803d',
            '#f55c5c', '#f87171', '#ef4444', '#dc2626', '#b91c1c',
            '#f0a64a', '#fb923c', '#f97316', '#ea580c', '#c2410c',
            '#4aa0f0', '#60a5fa', '#3b82f6', '#2563eb', '#1d4ed8',
            '#ec4899', '#db2777', '#be185d', '#9d174d',
            '#a78bfa', '#8b5cf6', '#7c3aed', '#6d28d9', '#5b21b6'
        ];

        const randomPiece = () => {
            const idx = Math.floor(Math.random() * SHAPES.length);
            const randomColor = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
            return {
                shape: SHAPES[idx].map(row => [...row]),
                color: randomColor,
                index: idx
            };
        };

        const rotateShape = (shape) => {
            const rows = shape.length, cols = shape[0].length;
            const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    rotated[j][rows - 1 - i] = shape[i][j];
                }
            }
            return rotated;
        };

        // ---------- 主组件 ----------
        function App() {
            const [board, setBoard] = useState(() =>
                Array(ROWS).fill().map(() => Array(COLS).fill(0))
            );
            const [currentPiece, setCurrentPiece] = useState(null);
            const [nextPiece, setNextPiece] = useState(() => randomPiece());
            const [score, setScore] = useState(0);
            const [level, setLevel] = useState(0);
            const [lines, setLines] = useState(0);
            const [gameActive, setGameActive] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [elapsedSeconds, setElapsedSeconds] = useState(0);
            const [gameOver, setGameOver] = useState(false);
            const [showGameOverModal, setShowGameOverModal] = useState(false);
            const [showPauseModal, setShowPauseModal] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '' });

            const [bestRecord, setBestRecord] = useState(() => {
                const saved = localStorage.getItem('tetris_best_v2');
                return saved ? JSON.parse(saved) : { level: 0, score: 0, time: 0 };
            });

            const timerRef = useRef(null);
            const startTimeRef = useRef(null);
            const dropIntervalRef = useRef(null);
            const canvasRef = useRef(null);
            // 存储canvas上下文，避免重复获取
            const ctxRef = useRef(null);

            const showToastMsg = useCallback((msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false, msg: '' }), 2000);
            }, []);

            const getDropSpeed = useCallback(() => {
                return Math.max(80, 500 - level * 30);
            }, [level]);

            // 碰撞检测 (纯函数)
            const collision = useCallback((board, shape, offsetX, offsetY) => {
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[0].length; c++) {
                        if (shape[r][c] !== 0) {
                            const boardX = offsetX + c;
                            const boardY = offsetY + r;
                            if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                            if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                        }
                    }
                }
                return false;
            }, []);

            const mergePieceToBoard = useCallback((piece) => {
                const newBoard = board.map(row => [...row]);
                for (let r = 0; r < piece.shape.length; r++) {
                    for (let c = 0; c < piece.shape[0].length; c++) {
                        if (piece.shape[r][c] !== 0) {
                            const y = piece.y + r;
                            const x = piece.x + c;
                            if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                                newBoard[y][x] = piece.color;
                            }
                        }
                    }
                }
                return newBoard;
            }, [board]);

            const clearFullRows = useCallback((boardWithColor) => {
                let rowsCleared = 0;
                const newBoard = [];
                for (let row = ROWS - 1; row >= 0; row--) {
                    if (boardWithColor[row].every(cell => cell !== 0)) {
                        rowsCleared++;
                    } else {
                        newBoard.unshift([...boardWithColor[row]]);
                    }
                }
                for (let i = 0; i < rowsCleared; i++) {
                    newBoard.unshift(Array(COLS).fill(0));
                }

                if (rowsCleared > 0) {
                    const baseScore = [0, 100, 300, 600, 1000][rowsCleared] || 1500;
                    const addedScore = baseScore * (level + 1);
                    setScore(s => s + addedScore);
                    const newLines = lines + rowsCleared;
                    setLines(newLines);
                    const newLevel = Math.floor(newLines / 5);
                    if (newLevel > level) {
                        setLevel(newLevel);
                        showToastMsg(`🎉 升级到 ${newLevel} 级！速度加快`);
                    }
                }
                return newBoard;
            }, [level, lines, showToastMsg]);

            const spawnNewPiece = useCallback(() => {
                if (!nextPiece) {
                    setNextPiece(randomPiece());
                    return null;
                }
                const newCurrent = {
                    shape: nextPiece.shape.map(row => [...row]),
                    color: nextPiece.color,
                    x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                    y: 0,
                };
                setNextPiece(randomPiece());

                if (collision(board, newCurrent.shape, newCurrent.x, newCurrent.y)) {
                    return 'GAME_OVER';
                }
                return newCurrent;
            }, [board, nextPiece, collision]);

            const tryRotateWithOffset = useCallback((piece) => {
                const rotated = rotateShape(piece.shape);
                const offsets = [0, -1, 1, -2, 2];
                for (const offset of offsets) {
                    const newX = piece.x + offset;
                    if (!collision(board, rotated, newX, piece.y)) {
                        return { ...piece, shape: rotated, x: newX };
                    }
                }
                return null;
            }, [board, collision]);

            // 移动/旋转/固定核心逻辑 (与之前保持一致，但为了canvas渲染，不需要返回特殊值)
            const movePiece = useCallback((dx, dy, isRotate = false) => {
                if (!gameActive || isPaused || !currentPiece) return false;

                if (isRotate) {
                    const rotatedPiece = tryRotateWithOffset(currentPiece);
                    if (rotatedPiece) {
                        setCurrentPiece(rotatedPiece);
                        return true;
                    }
                    return false;
                }

                const newX = currentPiece.x + (dx || 0);
                const newY = currentPiece.y + (dy || 0);

                if (!collision(board, currentPiece.shape, newX, newY)) {
                    setCurrentPiece({ ...currentPiece, x: newX, y: newY });
                    return true;
                } else if (dy === 1) {
                    // 向下移动失败 => 固定
                    const mergedBoard = mergePieceToBoard(currentPiece);
                    const afterClear = clearFullRows(mergedBoard);
                    setBoard(afterClear);

                    const spawnResult = spawnNewPiece();
                    if (spawnResult === 'GAME_OVER') {
                        setGameActive(false);
                        setGameOver(true);
                        setShowGameOverModal(true);
                        if (score > bestRecord.score) {
                            const newBest = { level, score, time: elapsedSeconds };
                            setBestRecord(newBest);
                            localStorage.setItem('tetris_best_v2', JSON.stringify(newBest));
                        }
                    } else if (spawnResult) {
                        setCurrentPiece(spawnResult);
                    }
                }
                return false;
            }, [board, currentPiece, gameActive, isPaused, collision, mergePieceToBoard, clearFullRows, spawnNewPiece, score, level, elapsedSeconds, bestRecord, tryRotateWithOffset]);

            const hardDrop = useCallback(() => {
                if (!gameActive || isPaused || !currentPiece) return;

                let dropDistance = 0;
                while (!collision(board, currentPiece.shape, currentPiece.x, currentPiece.y + dropDistance + 1)) {
                    dropDistance++;
                }

                if (dropDistance > 0) {
                    setCurrentPiece(prev => ({ ...prev, y: prev.y + dropDistance }));
                    requestAnimationFrame(() => {
                        if (gameActive && !isPaused) {
                            const mergedBoard = mergePieceToBoard({ ...currentPiece, y: currentPiece.y + dropDistance });
                            const afterClear = clearFullRows(mergedBoard);
                            setBoard(afterClear);
                            const spawnResult = spawnNewPiece();
                            if (spawnResult === 'GAME_OVER') {
                                setGameActive(false);
                                setGameOver(true);
                                setShowGameOverModal(true);
                                if (score > bestRecord.score) {
                                    const newBest = { level, score, time: elapsedSeconds };
                                    setBestRecord(newBest);
                                    localStorage.setItem('tetris_best_v2', JSON.stringify(newBest));
                                }
                            } else if (spawnResult) {
                                setCurrentPiece(spawnResult);
                            }
                        }
                    });
                } else {
                    // 无法下落，直接固定
                    const mergedBoard = mergePieceToBoard(currentPiece);
                    const afterClear = clearFullRows(mergedBoard);
                    setBoard(afterClear);
                    const spawnResult = spawnNewPiece();
                    if (spawnResult === 'GAME_OVER') {
                        setGameActive(false);
                        setGameOver(true);
                        setShowGameOverModal(true);
                        if (score > bestRecord.score) {
                            const newBest = { level, score, time: elapsedSeconds };
                            setBestRecord(newBest);
                            localStorage.setItem('tetris_best_v2', JSON.stringify(newBest));
                        }
                    } else if (spawnResult) {
                        setCurrentPiece(spawnResult);
                    }
                }
            }, [board, currentPiece, gameActive, isPaused, collision, mergePieceToBoard, clearFullRows, spawnNewPiece, score, level, elapsedSeconds, bestRecord]);

            // 键盘控制 (复用之前)
            const pauseGame = useCallback(() => {
                if (!gameActive || isPaused) return;
                setIsPaused(true);
                setShowPauseModal(true);
            }, [gameActive, isPaused]);

            const resumeGame = useCallback(() => {
                setIsPaused(false);
                setShowPauseModal(false);
            }, []);

            const takeRest = useCallback(() => {
                setGameActive(false);
                setIsPaused(false);
                setGameOver(false);
                setShowPauseModal(false);
                setShowGameOverModal(false);
                setBoard(Array(ROWS).fill().map(() => Array(COLS).fill(0)));
                setCurrentPiece(null);
                setNextPiece(randomPiece());
                setScore(0);
                setLevel(0);
                setLines(0);
                setElapsedSeconds(0);
                showToastMsg('休息一下 ~ 选择开始吧');
            }, [showToastMsg]);

            const startNewGame = useCallback(() => {
                setBoard(Array(ROWS).fill().map(() => Array(COLS).fill(0)));
                const firstNext = randomPiece();
                setNextPiece(firstNext);
                const spawn = {
                    shape: firstNext.shape.map(row => [...row]),
                    color: firstNext.color,
                    x: Math.floor((COLS - firstNext.shape[0].length) / 2),
                    y: 0,
                };
                setCurrentPiece(spawn);
                setNextPiece(randomPiece());
                setScore(0);
                setLevel(0);
                setLines(0);
                setElapsedSeconds(0);
                setGameActive(true);
                setIsPaused(false);
                setGameOver(false);
                setShowGameOverModal(false);
                setShowPauseModal(false);
                showToastMsg('游戏开始！');
            }, [showToastMsg]);

            useEffect(() => {
                const handler = (e) => {
                    if (!gameActive && e.key.toLowerCase() !== 'r') return;

                    const key = e.key.toLowerCase();
                    const controlKeys = ['arrowleft', 'arrowright', 'arrowdown', 'arrowup', ' ', 'space', 'p', 'r'];

                    if (controlKeys.includes(key) || e.key === ' ') {
                        e.preventDefault();
                    }

                    switch (key) {
                        case 'arrowleft': movePiece(-1, 0); break;
                        case 'arrowright': movePiece(1, 0); break;
                        case 'arrowdown': movePiece(0, 1); break;
                        case 'arrowup': movePiece(0, 0, true); break;
                        case ' ': case 'space': hardDrop(); break;
                        case 'p': if (gameActive && !isPaused) pauseGame(); else if (isPaused) resumeGame(); break;
                        case 'r': takeRest(); break;
                        default: break;
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [gameActive, isPaused, movePiece, hardDrop, pauseGame, resumeGame, takeRest]);

            // 自动下落
            useEffect(() => {
                if (gameActive && !isPaused) {
                    dropIntervalRef.current = setInterval(() => {
                        movePiece(0, 1);
                    }, getDropSpeed());
                } else {
                    clearInterval(dropIntervalRef.current);
                }
                return () => clearInterval(dropIntervalRef.current);
            }, [gameActive, isPaused, getDropSpeed, movePiece]);

            // 计时器
            useEffect(() => {
                if (gameActive && !isPaused) {
                    startTimeRef.current = Date.now() - elapsedSeconds * 1000;
                    timerRef.current = setInterval(() => {
                        setElapsedSeconds(Math.floor((Date.now() - startTimeRef.current) / 1000));
                    }, 200);
                }
                return () => clearInterval(timerRef.current);
            }, [gameActive, isPaused, elapsedSeconds]);

            // ---------- Canvas 渲染 ----------
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctxRef.current = ctx;

                // 设置画布物理像素尺寸，避免模糊
                const container = canvas.parentElement;
                const containerWidth = container.clientWidth;
                const size = Math.min(containerWidth, 300); // 最大300px
                canvas.width = size;
                canvas.height = size * (ROWS / COLS); // 保持20:10比例
            }, []);

            // 绘制游戏板
            const drawBoard = useCallback(() => {
                const canvas = canvasRef.current;
                const ctx = ctxRef.current;
                if (!canvas || !ctx) return;

                const w = canvas.width;
                const h = canvas.height;
                const cellSize = w / COLS; // 宽度基于列数

                ctx.clearRect(0, 0, w, h);

                // 绘制背景网格线 (类似原格子背景)
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid-bg').trim() || '#ecf0f1';
                ctx.fillRect(0, 0, w, h);

                // 绘制已固定的方块 (board) - 添加凸起感
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        const color = board[row][col];
                        if (color !== 0) {
                            const x = col * cellSize;
                            const y = row * cellSize;
                            const cellInnerSize = cellSize - 1;

                            // 1. 绘制方块主体
                            ctx.fillStyle = color;
                            ctx.fillRect(x, y, cellInnerSize, cellInnerSize);

                            // 2. 绘制凸起内阴影（和下一方块 .next-cell.filled 样式一致）
                            // 左上高光内阴影
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                            ctx.fillRect(x, y, cellInnerSize, 2); // 上高光
                            ctx.fillRect(x, y, 2, cellInnerSize); // 左高光

                            // 右下暗部内阴影
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                            ctx.fillRect(x, y + cellInnerSize - 2, cellInnerSize, 2); // 下暗部
                            ctx.fillRect(x + cellInnerSize - 2, y, 2, cellInnerSize); // 右暗部

                            // 3. 轻微圆角强化凸起感（和下一方块一致）
                            ctx.beginPath();
                            ctx.roundRect(x, y, cellInnerSize, cellInnerSize, 2);
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                // 绘制当前方块 (如果有) - 同样添加凸起感
                if (currentPiece && gameActive && !isPaused) {
                    for (let r = 0; r < currentPiece.shape.length; r++) {
                        for (let c = 0; c < currentPiece.shape[0].length; c++) {
                            if (currentPiece.shape[r][c] !== 0) {
                                const x = (currentPiece.x + c) * cellSize;
                                const y = (currentPiece.y + r) * cellSize;
                                const cellInnerSize = cellSize - 1;

                                // 1. 绘制方块主体
                                ctx.fillStyle = currentPiece.color;
                                ctx.fillRect(x, y, cellInnerSize, cellInnerSize);

                                // 2. 凸起内阴影（和下一方块样式对齐）
                                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                                ctx.fillRect(x, y, cellInnerSize, 2);
                                ctx.fillRect(x, y, 2, cellInnerSize);

                                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                                ctx.fillRect(x, y + cellInnerSize - 2, cellInnerSize, 2);
                                ctx.fillRect(x + cellInnerSize - 2, y, 2, cellInnerSize);

                                // 3. 圆角边框
                                ctx.beginPath();
                                ctx.roundRect(x, y, cellInnerSize, cellInnerSize, 2);
                                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                }

                // 绘制网格线 (模仿原有边框)
                ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid-border').trim() || '#34495e';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= COLS; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * cellSize, 0);
                    ctx.lineTo(i * cellSize, h);
                    ctx.stroke();
                }
                for (let i = 0; i <= ROWS; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * cellSize);
                    ctx.lineTo(w, i * cellSize);
                    ctx.stroke();
                }
            }, [board, currentPiece, gameActive, isPaused]);

            useEffect(() => {
                drawBoard();
            }, [drawBoard, board, currentPiece, gameActive, isPaused]);

            // 监听主题变化轻微重绘
            useEffect(() => {
                const observer = new MutationObserver(() => drawBoard());
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['style'] });
                return () => observer.disconnect();
            }, [drawBoard]);

            // 渲染下一个方块 (还是用div，简单)
            const renderNext = () => {
                if (!nextPiece) return null;
                const shape = nextPiece.shape;
                const shapeWidth = shape[0].length;
                const shapeHeight = shape.length;
                const offsetX = Math.floor((4 - shapeWidth) / 2);
                const offsetY = Math.floor((4 - shapeHeight) / 2);
                const cells = [];
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        const shapeRow = r - offsetY;
                        const shapeCol = c - offsetX;
                        const filled = shapeRow >= 0 && shapeRow < shapeHeight &&
                            shapeCol >= 0 && shapeCol < shapeWidth &&
                            shape[shapeRow][shapeCol] ? true : false;
                        cells.push(
                            <div key={`n${r}-${c}`}
                                className={`next-cell ${filled ? 'filled' : ''}`}
                                style={{ color: filled ? nextPiece.color : 'transparent' }}
                            />
                        );
                    }
                }
                return cells;
            };

            return (
                <div className="tetris-container">
                    <h1>🎮 俄罗斯方块</h1>
                    <div className="game-panel">
                        <div className="play-area">
                            <div className="canvas-wrapper">
                                <canvas ref={canvasRef}></canvas>
                            </div>
                        </div>
                        <div className="info-area">
                            <div className="stat-item"><div className="stat-label">得分</div><div className="stat-value">{score}</div></div>
                            <div className="stat-item"><div className="stat-label">等级</div><div className="stat-value">{level}</div></div>
                            <div className="stat-item"><div className="stat-label">时间</div><div className="stat-value">{String(Math.floor(elapsedSeconds / 60)).padStart(2, '0')}:{String(elapsedSeconds % 60).padStart(2, '0')}</div></div>
                            <div className="next-piece">
                                <div className="next-title">▶ 下一个</div>
                                <div className="next-grid">{renderNext()}</div>
                            </div>
                        </div>
                    </div>

                    <div className="button-group">
                        <button className="btn btn-primary" onClick={startNewGame} disabled={gameActive && !isPaused}>开始</button>
                        <button className="btn btn-warning" onClick={pauseGame} disabled={!gameActive || isPaused}>暂停</button>
                        <button className="btn btn-secondary" onClick={takeRest}>休息一会</button>
                    </div>

                    {/* 暂停模态 */}
                    <div className={`modal ${showPauseModal ? 'show' : ''}`}>
                        <div className="modal-content">
                            <h2>⏸️ 游戏暂停</h2>
                            <p>当前等级: {level} &nbsp; 得分: {score}</p>
                            <button className="btn btn-success" style={{ width: '100%', marginTop: '16px' }} onClick={resumeGame}>继续游戏</button>
                        </div>
                    </div>

                    {/* 游戏结束模态 */}
                    <div className={`modal ${showGameOverModal ? 'show' : ''}`}>
                        <div className="modal-content">
                            <h2 style={{ color: 'var(--btn-danger)' }}>💀 游戏结束</h2>
                            <div className="best-record">
                                <p><strong>本次成绩</strong><br />等级 {level} · 得分 {score}<br />时间 {String(Math.floor(elapsedSeconds / 60)).padStart(2, '0')}:{String(elapsedSeconds % 60).padStart(2, '0')}</p>
                                <p><strong>🏆 历史最佳</strong><br />等级 {bestRecord.level} · 得分 {bestRecord.score}<br />时间 {String(Math.floor(bestRecord.time / 60)).padStart(2, '0')}:{String(bestRecord.time % 60).padStart(2, '0')}</p>
                            </div>
                            <button className="btn btn-primary" style={{ width: '100%' }} onClick={startNewGame}>再玩一局</button>
                        </div>
                    </div>

                    {toast.show && <div className="toast">{toast.msg}</div>}

                    <div className="instructions">
                        ⬅️⬇️➡️ 移动 &nbsp; ⬆️ 旋转 &nbsp; 空格 直接落地<br />
                        每消除5行升1级，速度加快。挑战高分吧！
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
