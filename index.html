<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>游戏大厅</title>
    <script crossorigin src="./assets/js/react.development.js"></script>
    <script crossorigin src="./assets/js/react-dom.development.js"></script>
    <script src="./assets/js/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2b3a4a 0%, #1d2b36 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background 0.3s ease;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0b1a2a 0%, #0e1a1f 100%);
            }
        }

        #root {
            width: 100%;
            max-width: 1200px;
        }

        /* 主题CSS变量 (从各游戏抽取统一变量) */
        :root {
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --info-bg: #ecf0f1;
            --border-color: #b0bec5;
            --panel-bg: #f8f9fa;
            --game-bg: #1a2632;
            --paddle-color: #3498db;
            --ball-color: #e74c3c;
            --btn-primary: #3498db;
            --btn-success: #2ecc71;
            --btn-warning: #f39c12;
            --btn-danger: #e74c3c;
            --btn-secondary: #95a5a6;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --toast-bg: rgba(0, 0, 0, 0.8);
            --toast-text: white;
            --message-bg: white;
            --grid-border: #34495e;
            --grid-bg: #ecf0f1;
            --card-hover: #e3f2fd;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1e2b38;
                --text-color: #e0e0e0;
                --info-bg: #2c3e50;
                --border-color: #4a5b6b;
                --panel-bg: #263238;
                --game-bg: #0f1a24;
                --paddle-color: #5faee3;
                --ball-color: #ff6b6b;
                --btn-primary: #2980b9;
                --btn-success: #27ae60;
                --btn-warning: #e67e22;
                --btn-danger: #c0392b;
                --btn-secondary: #7f8c8d;
                --shadow-color: rgba(0, 0, 0, 0.5);
                --toast-bg: rgba(255, 255, 255, 0.9);
                --toast-text: #2c3e50;
                --message-bg: #34495e;
                --grid-border: #78909c;
                --grid-bg: #2a3b47;
                --card-hover: #2c4050;
            }
        }

        .home-container {
            background: var(--bg-color);
            border-radius: 32px;
            padding: 24px 20px 30px 20px;
            box-shadow: 0 25px 50px var(--shadow-color);
            transition: background 0.3s, color 0.3s;
            color: var(--text-color);
        }

        h1 {
            text-align: center;
            margin: 0 0 8px 0;
            font-weight: 400;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-shadow: 3px 3px 6px var(--shadow-color);
        }

        /* 游戏卡片网格 ———— 可扩展区域 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
            margin: 28px 0 20px 0;
        }

        .game-card {
            background: var(--info-bg);
            border-radius: 28px;
            padding: 22px 16px 18px 16px;
            box-shadow: 0 12px 20px var(--shadow-color);
            transition: all 0.25s ease;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--btn-primary);
            background: var(--card-hover);
            box-shadow: 0 22px 30px var(--shadow-color);
        }

        .game-card:active {
            transform: translateY(-2px);
        }

        /* 游戏图标区域 — 采用游戏主题色+简单图形 */
        .game-icon {
            width: 100px;
            height: 100px;
            border-radius: 40px;
            background: var(--game-bg);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 10px 15px var(--shadow-color);
            transition: transform 0.2s;
        }

        .game-card:hover .game-icon {
            transform: scale(1.02);
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .game-desc {
            font-size: 0.9rem;
            opacity: 0.8;
            margin: 6px 0 12px 0;
            padding: 0 8px;
        }

        .game-meta {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            font-size: 0.8rem;
            background: var(--panel-bg);
            padding: 8px 12px;
            border-radius: 40px;
            width: fit-content;
            margin-top: 6px;
            box-shadow: inset 0 1px 4px var(--shadow-color);
        }

        .badge {
            background: var(--btn-secondary);
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        /* 功能按钮组 (和游戏页面一致) */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 28px;
            border-top: 1px dashed var(--border-color);
            padding-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2), inset 0 2px 5px rgba(255,255,255,0.3);
            transition: all 0.08s linear;
            color: white;
            flex: 0 1 auto;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 2px solid rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2), inset 0 1px 3px rgba(255,255,255,0.3);
        }

        .btn-primary { background: var(--btn-primary); }
        .btn-success { background: var(--btn-success); }
        .btn-secondary { background: var(--btn-secondary); }

        /* 保留极简页脚，但去除文字说明 */
        .footer-placeholder {
            height: 10px;
        }

        /* 响应式 */
        @media (max-width: 550px) {
            h1 { font-size: 1.8rem; }
            .game-grid { grid-template-columns: 1fr; }
            .game-card { flex-direction: row; text-align: left; gap: 16px; padding: 16px; }
            .game-icon { width: 70px; height: 70px; font-size: 36px; margin-bottom: 0; flex-shrink: 0; }
            .game-title { font-size: 1.5rem; }
            .game-desc { margin: 2px 0; }
            .game-meta { margin-top: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useCallback } = React;

        function HomePage() {
            // 游戏库数据 —— 轻松扩展：只需在此数组添加新游戏对象
            const games = [
                {
                    id: 'sudoku',
                    title: '数独挑战',
                    desc: '四种难度 · 唯一解生成 · 惩罚提示',
                    icon: '🧮',
                    color: '#9b59b6',
                    path: 'sudoku.html',
                    badge: '逻辑',
                    stats: '大师模式'
                },
                {
                    id: 'tetris',
                    title: '俄罗斯方块',
                    desc: '经典下落 · 五级速度 · 历史记录',
                    icon: '🧩',
                    color: '#3498db',
                    path: 'tetris.html',
                    badge: '消除',
                    stats: '每日挑战'
                },
                {
                    id: 'tanqiu',
                    title: '弹球大冒险',
                    desc: '打砖块 · 多形状障碍 · 等级加速',
                    icon: '🏓',
                    color: '#e74c3c',
                    path: 'tanqiu.html',
                    badge: '物理弹球',
                    stats: '多变关卡'
                },
                // ===== 未来新游戏直接在此添加 =====
                // {
                //    id: 'newgame',
                //    title: '新游戏',
                //    desc: '描述文本',
                //    icon: '🎮',
                //    color: '#f39c12',
                //    path: 'newgame.html',
                //    badge: '新',
                //    stats: '即将上线'
                // }
            ];

            // 处理卡片点击: 跳转到对应游戏
            const handleGameClick = (path) => {
                window.location.href = path;
            };

            // 随机游戏: 从games数组中随机挑选一个
            const handleRandomGame = () => {
                if (games.length === 0) return;
                const randomIndex = Math.floor(Math.random() * games.length);
                const randomGame = games[randomIndex];
                window.location.href = randomGame.path;
            };

            // 休息一下: 无文字提示，仅刷新页面? 或者什么也不做，给用户清静
            const handleTakeRest = () => {
                // 保持简单，不做任何操作 (或者你可以重置一些状态，但目前不需要)
                // 为了有点反馈，可以轻微改变背景? 但为了简洁，留空
                // 这里简单返回，不做任何事。
            };

            // 重置所有记录 (清除localStorage里的游戏记录) — 保留这个功能，但可以静默执行，不加文字
            const handleResetRecords = () => {
                if (window.confirm('确定清除所有游戏的本地记录吗？')) {
                    localStorage.removeItem('brickbreaker_best');
                    localStorage.removeItem('tetris_best_v2');
                    localStorage.removeItem('sudoku_records_v2');
                    // 不再弹出成功提示
                }
            };

            return (
                <div className="home-container">
                    <h1>🎮 游戏大厅</h1>
                    {/* 完全去掉副标题或任何描述 */}

                    {/* 可扩展的游戏卡片网格 */}
                    <div className="game-grid">
                        {games.map(game => (
                            <div
                                key={game.id}
                                className="game-card"
                                onClick={() => handleGameClick(game.path)}
                                style={{ borderBottomColor: game.color }}
                            >
                                <div className="game-icon" style={{ background: `linear-gradient(145deg, ${game.color}30, var(--game-bg))` }}>
                                    {game.icon}
                                </div>
                                <div style={{ flex: 1 }}>
                                    <div className="game-title" style={{ color: game.color }}>{game.title}</div>
                                    <div className="game-desc">{game.desc}</div>
                                    <div className="game-meta">
                                        <span className="badge" style={{ background: game.color }}>{game.badge}</span>
                                        <span>⚡ {game.stats}</span>
                                    </div>
                                </div>
                            </div>
                        ))}

                        {/* 占位符卡片：预示未来新游戏 — 扩展提示，但不包含文字说明 */}
                        <div className="game-card" style={{ opacity: 0.7, background: 'var(--panel-bg)', border: '2px dashed var(--border-color)', cursor: 'default' }}>
                            <div className="game-icon" style={{ background: 'var(--border-color)', fontSize: '2rem' }}>➕</div>
                            <div>
                                <div className="game-title" style={{ fontSize: '1.5rem' }}>更多游戏</div>
                                <div className="game-desc"> </div> {/* 占位空白描述 */}
                                <div className="game-meta"><span className="badge" style={{ background: 'var(--btn-secondary)' }}>开发中</span></div>
                            </div>
                        </div>
                    </div>

                    {/* 底部按钮组 (与游戏内交互类似) — 按钮文字简洁，无额外说明 */}
                    <div className="button-group">
                        <button className="btn btn-primary" onClick={handleRandomGame}>🔀 随机</button>
                        {/*<button className="btn btn-success" onClick={handleTakeRest}>🧘 休息</button>*/}
                        <button className="btn btn-secondary" onClick={handleResetRecords}>🗑️ 清除</button>
                    </div>

                    {/* 完全移除所有小贴士、主题提示、版本号、页脚文字，只留一个极简占位 */}
                    <div className="footer-placeholder"></div>
                </div>
            );
        }

        // 渲染到 root
        ReactDOM.createRoot(document.getElementById('root')).render(<HomePage />);
    </script>
</body>
</html>
